<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoundMap - خريطة الأصوات</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
line-height:1.7;
}

header{
background:#1e293b;
padding:25px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.3);
}

header h1{
font-size:40px;
margin-bottom:10px;
}

header p{
font-size:18px;
color:#cbd5e1;
}

nav{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

nav button{
padding:12px 24px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:17px;
background:#22c55e;
color:white;
transition:.3s;
}

nav button:hover{
background:#16a34a;
}

main{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

section{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

h2{
margin-bottom:15px;
color:#22c55e;
}

</style>

</head>

<body>

<header>

<h1>🌍 SoundMap</h1>

<p>
اكتشف أصوات العالم وشارك تسجيلاتك بسهولة.
</p>

<nav>

<button>
استكشف الأصوات
</button>

<button>
رفع صوت جديد
</button>

<button>
تسجيل الدخول
</button>

</nav>

</header>

<main>

<section>

<h2>
مرحبًا بك
</h2>

<p>

SoundMap هو مشروع يتيح للمستخدمين استكشاف الأصوات من مختلف أنحاء العالم، وإضافة تسجيلاتهم وربطها بالموقع الجغرافي.

</p>

</section>

</main>

</body>

</html>
